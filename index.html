    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BoatAI",
      "url": "https://boat-ai.jp/",
      "description": "AI技術を活用したボートレース予想サービス。45項目以上のデータを総合的に分析し、高精度な予想を提供。",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://boat-ai.jp/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "offers": {
        "@type": "Offer",
        "price": "0",
