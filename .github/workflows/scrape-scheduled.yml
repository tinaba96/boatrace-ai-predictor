name: Scrape Scheduled

on:
  workflow_dispatch:
  schedule:
    # フォールバック用（プライマリは cron-job.org から workflow_dispatch で5分毎にトリガー）
    # cron-job.org 障害時のバックアップとして JST 7:00-22:00 の10分間隔で実行 (UTC換算)
    - cron: '*/10 22-23,0-13 * * *'

concurrency:
  group: scrape-scheduled
  cancel-in-progress: false  # 朝の初期化を完走させるため

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 朝の初期化（races テーブルが空の場合のみ scrape-to-json + generate-predictions フルモードを実行）
      - name: Morning initialization
        run: node scripts/daily/morning-init.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        continue-on-error: true

      # スクレイピングオーケストレーター
      # スケジュール取得を1回のみ実行し、対象ウィンドウのレースがあれば必要な処理を実行する。
      # 対象レースがなければ即終了（Egress ゼロ）。データ更新時のみ予測リフレッシュ・Deploy Hook を実行。
      - name: Run scraping orchestrator
        run: node scripts/daily/scrape-scheduled.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        continue-on-error: true
