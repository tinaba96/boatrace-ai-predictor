name: Scrape Scheduled

on:
  workflow_dispatch:
  schedule:
    # フォールバック用（プライマリは cron-job.org から workflow_dispatch で5分毎にトリガー）
    # cron-job.org 障害時のバックアップとして JST 7:00-22:00 の10分間隔で実行 (UTC換算)
    - cron: '*/10 22-23,0-13 * * *'

concurrency:
  group: scrape-scheduled
  cancel-in-progress: false  # 朝の初期化を完走させるため

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Phase 1: オッズ取得（発走前60/30/15/10/5分前のウィンドウ）
      - name: Scrape odds for upcoming races
        run: node scripts/daily/scrape-odds.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      # Phase 2: レース情報更新（発走1時間前: 欠場・代替・天候）
      - name: Update race info for upcoming races
        run: node scripts/daily/update-race-info.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      # Phase 3: 展示データ取得（発走30分前ウィンドウ）
      - name: Scrape exhibition data for upcoming races
        run: node scripts/daily/scrape-exhibition-data.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      # Phase 3: 結果取得（発走後5分以上経過レース）
      - name: Scrape race results for finished races
        run: node scripts/daily/scrape-results.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      # Phase 4: 予測リフレッシュ（各ウィンドウのレースを再予測）
      - name: Refresh predictions for upcoming races
        run: node scripts/daily/generate-predictions.js --refresh
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        continue-on-error: true
