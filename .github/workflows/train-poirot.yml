name: Train Poirot Models

# ポアロ予想 V1(RandomForest)/V2(LightGBM) を週次で再学習し、
# 学習済みモデルを Supabase Storage の `poirot` バケットへアップロードする。
# モデルはバイナリで大きいため git ではなく Storage で管理する。

on:
  schedule:
    # JST 日曜 03:00 = UTC 土曜 18:00（train-sherlock の30分後）
    - cron: '0 18 * * 6'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Python deps
        run: pip install -r scripts/ml/requirements.txt

      - name: Export training data from Supabase
        run: node scripts/ml/export-training-data.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # backfill CSV は CI に存在しないため Supabase 蓄積分のみで学習する
      # （features.load_dataset は backfill が無ければ自動で Supabase のみを使用）
      - name: Train V1 (RandomForest)
        working-directory: scripts/ml
        run: python train_rf.py

      - name: Train V2 (LightGBM)
        working-directory: scripts/ml
        run: python train_v2.py

      - name: Upload models to Supabase Storage
        run: node scripts/ml/storage-models.js upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
