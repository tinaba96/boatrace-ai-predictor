name: Scrape Exhibition Data

on:
  schedule:
    # JST 9:00-17:00 = UTC 0:00-8:00、15分間隔
    # レース開催時間帯のみ（ナイターは既存の1時間ワークフローでカバー）
    - cron: '*/15 0-8 * * *'
  workflow_dispatch:

concurrency:
  group: scrape-exhibition
  cancel-in-progress: true

jobs:
  scrape-exhibition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Scrape exhibition data directly to Supabase
        run: node scripts/daily/scrape-exhibition-data.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TZ: 'Asia/Tokyo'
