name: Scrape Race Data

on:
  schedule:
    # 1時間間隔で実行（UTC時刻）
    # JST 3:00-22:00 = UTC 18:00-23:00, 0:00-13:00 の間、毎時実行
    - cron: '0 0-13,18-23 * * *'

  # 手動実行も可能
  workflow_dispatch:

concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        run: mkdir -p data

      - name: Run scraper
        run: node scripts/scrape-to-json.js
        env:
          TZ: 'Asia/Tokyo'

      - name: Generate predictions
        run: node scripts/daily/generate-predictions.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Scrape race results
        run: node scripts/daily/scrape-results.js
        env:
          TZ: 'Asia/Tokyo'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Update race data and predictions [automated]"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Vercel Deploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
